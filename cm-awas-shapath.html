  </div>

  <div class="form-body" id="formSection">

    <div class="stamp-note">⚠️ यह शपथ पत्र ₹10 के स्टाम्प पेपर पर नोटरी करवाकर जमा करें</div>

    <!-- Applicant -->
    <div class="section">
      <div class="section-title">📋 आवेदक का विवरण</div>
      <div class="section-content">
        <div class="row">
          <div class="field"><label>आवेदक का नाम <span style="color:#c0392b">*</span></label><input type="text" id="s_name" placeholder="पूरा नाम"></div>
          <div class="field" style="max-width:130px;"><label>संबंध <span style="color:#c0392b">*</span></label><select id="s_rel"><option>पुत्र / S/o</option><option>पुत्री / D/o</option><option>पत्नी / W/o</option></select></div>
          <div class="field"><label>पिता / पति का नाम <span style="color:#c0392b">*</span></label><input type="text" id="s_father" placeholder="पिता या पति का नाम"></div>
        </div>
        <div class="row">
          <div class="field"><label>जन्मतिथि</label><input type="date" id="s_dob" class="dob-picker" data-placeholder="जन्मतिथि चुनें" onchange="calcSAge()"></div>
          <div class="field" style="max-width:100px;"><label>उम्र <span style="color:#c0392b">*</span></label><input type="number" id="s_age" placeholder="वर्ष" min="0" max="120"></div>
          <div class="field"><label>जाति</label><select id="s_caste"><option value="">— चुनें —</option><option>सामान्य (General)</option><option>OBC</option><option>SC</option><option>ST</option></select></div>
        </div>
        <div class="row">
          <div class="field"><label>आधार नंबर</label><input type="text" id="s_aadhaar" maxlength="12" placeholder="12 अंक" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'').substring(0,12)"></div>
          <div class="field"><label>मोबाइल</label><input type="text" id="s_mobile" maxlength="10" placeholder="10 अंक" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'').substring(0,10)"></div>
        </div>
      </div>
    </div>

    <!-- Address -->
    <div class="section">
      <div class="section-title">📍 पता</div>
      <div class="section-content">
        <div class="row">
          <div class="field"><label>ग्राम / मोहल्ला <span style="color:#c0392b">*</span></label><input type="text" id="s_village" placeholder="गाँव का नाम"></div>
          <div class="field"><label>ग्राम पंचायत</label><input type="text" id="s_gp" placeholder="ग्राम पंचायत"></div>

        <div class="row">
          <div class="field"><label>विकासखण्ड (ब्लॉक) <span style="color:#c0392b">*</span></label><input type="text" id="s_block" placeholder="ब्लॉक का नाम"></div>
          <div class="field"><label>जनपद (जिला) <span style="color:#c0392b">*</span></label><input type="text" id="s_district" placeholder="जिले का नाम"></div>
        </div>

              <option value="">— चुनें —</option>
              <option>बेघर / कच्चा-टूटा मकान</option>
              <option>आपदा प्रभावित (बाढ़ / भूकम्प / आग)</option>
              <option>गरीब विधवा महिला (18-50 वर्ष)</option>
              <option>गरीब विकलांग व्यक्ति</option>
              <option>घुमंतू जनजाति</option>
              <option>गम्भीर बीमारी से पीड़ित</option>
              <option>अन्य</option>

        </div>

<script>
// Set today
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('s_date').value = new Date().toISOString().split('T')[0];
});

function calcSAge() {
  var dob = document.getElementById('s_dob').value;
  if (!dob) return;
  var b = new Date(dob);
  var t = new Date();
  var a = t.getFullYear() - b.getFullYear();
  var m = t.getMonth() - b.getMonth();
  if (m < 0 || (m === 0 && t.getDate() < b.getDate())) a--;
  document.getElementById('s_age').value = a;
}

function fmtDate(v) {
  if (!v) return '____';
  var d = new Date(v);
  return d.getDate().toString().padStart(2,'0') + '/' + (d.getMonth()+1).toString().padStart(2,'0') + '/' + d.getFullYear();
}

function showPreview() {
  var name = document.getElementById('s_name').value.trim();
  var rel = document.getElementById('s_rel').value.split('/')[0].trim();
  var father = document.getElementById('s_father').value.trim();
  var age = document.getElementById('s_age').value;
  var caste = document.getElementById('s_caste').value;
  var aadhaar = document.getElementById('s_aadhaar').value;
  var mobile = document.getElementById('s_mobile').value;
  var village = document.getElementById('s_village').value.trim();
  var gp = document.getElementById('s_gp').value.trim();
  var block = document.getElementById('s_block').value.trim();
  var district = document.getElementById('s_district').value.trim();
  var category = document.getElementById('s_category').value;
  var dt = document.getElementById('s_date').value;
  var place = document.getElementById('s_place').value.trim();

  if (!name || !father || !block || !district || !village) {
    alert('कृपया सभी अनिवार्य (*) फ़ील्ड भरें।'); return;
  }

  var addr = 'ग्राम — ' + village + (gp ? ', ग्राम पंचायत — ' + gp : '') + ', विकासखण्ड — ' + block + ', जनपद — ' + district;

  var h = '';

  // ── Stamp paper note (screen only) ──
  h += '<div class="no-print" style="text-align:center;background:#fff8e1;border:2px dashed #e8640a;border-radius:8px;padding:10px;margin-bottom:16px;font-size:12px;color:#e8640a;font-weight:700;">⚠️ पहला पेज ₹10 के स्टाम्प पेपर पर प्रिंट होगा (ऊपर 60% खाली रहेगा)</div>';

  // ── Title ──
  h += '<div style="text-align:center; font-size:16px; font-weight:800; margin-bottom:6px; text-decoration:underline;">शपथ पत्र</div>';
  h += '<div style="text-align:center; font-size:12px; color:#555; margin-bottom:16px;">(मुख्यमंत्री आवास योजना — ग्रामीण के अंतर्गत)</div>';

  // ── Body ──
  h += '<div style="line-height:2;">';

  h += '<strong>सेवा में,</strong><br>';
  h += '&emsp;&emsp;<strong>खंड विकास अधिकारी</strong>,<br>';
  h += '&emsp;&emsp;विकासखण्ड — <strong>' + block + '</strong>,<br>';
  h += '&emsp;&emsp;जनपद — <strong>' + district + '</strong><br><br>';

  h += '<strong>विषय:</strong> मुख्यमंत्री आवास योजना (ग्रामीण) के अंतर्गत आवास निर्माण हेतु शपथ पत्र।<br><br>';

  // Para 1 — Introduction
  h += '&emsp;&emsp;मैं <strong>' + name + '</strong> ' + rel + ' <strong>' + father + '</strong>, उम्र <strong>' + (age || '____') + ' वर्ष</strong>, जाति — <strong>' + (caste || '____') + '</strong>, निवासी <strong>' + addr + '</strong>, आधार संख्या — <strong>' + (aadhaar || '____________') + '</strong> सशपथ घोषणा करता/करती हूँ कि —<br><br>';

  // Oath Points
  h += '<strong>1.</strong> मैं उपरोक्त पते का स्थायी निवासी हूँ तथा मैं <strong>"' + (category || '____') + '"</strong> श्रेणी के अंतर्गत मुख्यमंत्री आवास योजना (ग्रामीण) का पात्र/पात्रा हूँ।<br><br>';

  h += '<strong>2.</strong> मैंने या मेरे परिवार के किसी भी सदस्य ने इससे पूर्व <strong>प्रधानमंत्री आवास योजना (PMAY), इंदिरा आवास योजना (IAY), मुख्यमंत्री आवास योजना</strong> या किसी भी अन्य सरकारी आवास योजना के अंतर्गत <strong>पक्का मकान बनाने हेतु कोई लाभ/सहायता प्राप्त नहीं</strong> की है।<br><br>';

  h += '<strong>3.</strong> मेरे पास या मेरे परिवार के किसी भी सदस्य के नाम <strong>कोई पक्का मकान नहीं</strong> है।<br><br>';

  h += '<strong>4.</strong> मैं शपथपूर्वक वचन देता/देती हूँ कि आवास निर्माण हेतु प्राप्त धनराशि का उपयोग <strong>केवल पक्का मकान बनाने</strong> के लिए ही करूँगा/करूँगी तथा इसका <strong>किसी अन्य कार्य में दुरुपयोग नहीं</strong> करूँगा/करूँगी।<br><br>';

  h += '<strong>5.</strong> मैं <strong>नियमानुसार कार्य</strong> करूँगा/करूँगी तथा शासन/विभाग द्वारा निर्धारित <strong>सभी नियमों व शर्तों का पालन</strong> करूँगा/करूँगी।<br><br>';

  h += '<strong>6.</strong> मैं स्वीकृति के बाद <strong>निर्धारित समय सीमा (90 दिन)</strong> के अंदर आवास का निर्माण कार्य <strong>पूर्ण</strong> करूँगा/करूँगी।<br><br>';

  h += '<strong>7.</strong> निर्माण के प्रत्येक चरण (नींव, लिंटल, छत) की <strong>Geo-Tagged फोटो</strong> खिंचवाऊँगा/खिंचवाऊँगी तथा विभागीय अधिकारी को <strong>निरीक्षण</strong> की अनुमति दूँगा/दूँगी।<br><br>';

  h += '<strong>8.</strong> मकान का निर्माण न्यूनतम <strong>25 वर्ग मीटर</strong> क्षेत्रफल में करूँगा/करूँगी तथा मकान में <strong>शौचालय का निर्माण</strong> अवश्य करवाऊँगा/करवाऊँगी।<br><br>';

  h += '<strong>9.</strong> आवास का स्वामित्व <strong>महिला सदस्य</strong> या <strong>पति-पत्नी के संयुक्त नाम</strong> से होगा।<br><br>';

  h += '<strong>10.</strong> मैं आवास प्राप्ति के बाद <strong>5 वर्ष तक</strong> इस मकान को <strong>बेचूँगा/बेचूँगी नहीं</strong>।<br><br>';

  h += '<strong>11.</strong> यदि किसी भी समय मेरे द्वारा दी गई जानकारी <strong>असत्य/गलत</strong> पाई जाती है या मैं <strong>अपात्र</strong> पाया/पाई जाती हूँ तो मुझे प्राप्त <strong>सम्पूर्ण धनराशि की वसूली (Recovery)</strong> मुझसे की जा सकती है तथा मेरे विरुद्ध <strong>कानूनी कार्रवाई</strong> की जा सकती है। इसके लिए मैं पूर्णतः सहमत हूँ।<br><br>';

  h += '<strong>12.</strong> उपरोक्त सभी कथन <strong>मेरी जानकारी एवं विश्वास के अनुसार सत्य</strong> हैं। झूठी जानकारी प्रस्तुत करने के दंड से मैं <strong>भली भांति अवगत</strong> हूँ।<br><br>';

  // ── Signature ──
  h += '<div style="display:flex; justify-content:space-between; margin-top:20px;">';
  h += '<div><strong>दिनांक —</strong> ' + fmtDate(dt) + '<br><strong>स्थान —</strong> ' + (place || village || '________') + '</div>';
  h += '<div style="text-align:center;"><br><br>________________________<br><strong>शपथकर्ता के हस्ताक्षर / अंगूठा</strong><br>' + name + '<br>' + rel + ' ' + father + '<br>मो. ' + (mobile || '________') + '</div>';
  h += '</div>';

  h += '</div>'; // close line-height


  document.getElementById('previewContent').innerHTML = h;
  document.getElementById('formSection').style.display = 'none';
  document.getElementById('previewBox').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function printIt() {
  document.title = ' ';
  window.print();
  document.title = 'CM Awas Shapath Patra / आवास हेतु शपथ पत्र | VISRO Consultancy';
}
</script>
